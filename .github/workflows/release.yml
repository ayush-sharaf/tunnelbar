name: Release

# Build Tunnelbar and publish a GitHub Release either when a v* tag is pushed,
# or manually from the Actions tab ("Run workflow").
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 1.1 (blank = use Info.plist version)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version and tag
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' Info.plist)"
            TAG="v${VERSION}"
          fi
          # Keep the bundle version in sync so artifact names match the release.
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" Info.plist
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${TAG} (version ${VERSION})"

      - name: Show toolchain
        run: swift --version

      - name: Build and package (DMG + zip)
        run: ./package.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Tunnelbar ${{ steps.ver.outputs.version }}
          files: |
            dist/Tunnelbar-*.dmg
            dist/Tunnelbar-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
