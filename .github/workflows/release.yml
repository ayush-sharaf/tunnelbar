name: Release

# Build Tunnelbar and publish a GitHub Release whenever a v* tag is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build and package (DMG + zip)
        run: ./package.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Tunnelbar-*.dmg
            dist/Tunnelbar-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
