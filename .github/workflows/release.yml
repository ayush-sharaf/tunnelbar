name: Release

# Build Tunnelbar and publish a GitHub Release either when a v* tag is pushed,
# or manually from the Actions tab ("Run workflow"). After releasing, the
# version in Info.plist is bumped to match via an auto-merged PR (main is
# protected, so the bump goes through a pull request).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 1.1 (blank = use Info.plist version)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: macos-14
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version and tag
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' Info.plist)"
            TAG="v${VERSION}"
          fi
          # Keep the bundle version in sync so artifact names match the release.
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" Info.plist
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${TAG} (version ${VERSION})"

      - name: Show toolchain
        run: swift --version

      - name: Build and package (DMG + zip)
        run: ./package.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Tunnelbar ${{ steps.ver.outputs.version }}
          files: |
            dist/Tunnelbar-*.dmg
            dist/Tunnelbar-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Bump Info.plist on main to the released version, via an auto-merged PR
  # (direct pushes to main are blocked by branch protection).
  bump-version:
    needs: build-and-release
    runs-on: macos-14
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Bump version and open auto-merged PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-and-release.outputs.version }}
        run: |
          set -euo pipefail
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" Info.plist

          if git diff --quiet -- Info.plist; then
            echo "Info.plist already at ${VERSION}; nothing to bump."
            exit 0
          fi

          BRANCH="chore/bump-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git commit -am "chore: bump version to ${VERSION}"
          git push -u origin "${BRANCH}"
          gh pr create --base main --head "${BRANCH}" \
            --title "chore: bump version to ${VERSION}" \
            --body "Automated version bump after releasing v${VERSION}."
          # Use GitHub's native auto-merge: merges once branch-protection
          # requirements are satisfied (immediately when none are pending).
          gh pr merge "${BRANCH}" --auto --squash --delete-branch
