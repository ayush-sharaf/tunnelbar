name: Release

# Build Tunnelnest and publish a GitHub Release either when a v* tag is pushed,
# or manually from the Actions tab ("Run workflow"). The version is stamped into
# the app bundle at build time (the source Info.plist holds a placeholder), so
# nothing needs to be committed back to main.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 1.5'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version and tag
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${TAG} (version ${VERSION})"

      - name: Show toolchain
        run: swift --version

      - name: Build and package (DMG + zip)
        env:
          TUNNELNEST_VERSION: ${{ steps.ver.outputs.version }}
        run: ./package.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Tunnelnest ${{ steps.ver.outputs.version }}
          files: |
            dist/Tunnelnest-*.dmg
            dist/Tunnelnest-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
