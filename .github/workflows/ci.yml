name: CI

# Verify the app compiles and the logic tests pass on every PR and on main.
on:
  pull_request:
  push:
    branches: [main]

# Avoid redundant runs when a branch is pushed and a PR updates together.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        run: swift --version

      - name: Run tests
        run: ./scripts/run-tests.sh

      - name: Build app bundle
        run: ./build.sh
